<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Video Frame Extractor</title>
</head>
<body>
  <video id="video" muted playsinline crossorigin="anonymous"></video>
  <canvas id="canvas"></canvas>
  <script>
    async function waitForEvent(target, eventName) {
      return new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error("Timed out: " + eventName)), 10000);
        target.addEventListener(eventName, () => {
          clearTimeout(timeout);
          resolve();
        }, { once: true });
      });
    }

    async function loadVideo(src) {
      const video = document.getElementById("video");
      video.src = src;
      video.load();
      await waitForEvent(video, "loadedmetadata");
      return {
        duration: video.duration,
        width: video.videoWidth,
        height: video.videoHeight
      };
    }

    async function seekVideo(video, time) {
      video.currentTime = Math.max(0, Math.min(time, video.duration));
      await waitForEvent(video, "seeked");
    }

    function isBackgroundPixel(r, g, b) {
      const isGreen = g > 80 && g > r * 1.18 && g > b * 1.18;
      const isBlack = r < 25 && g < 25 && b < 25;
      return isGreen || isBlack;
    }

    function findCharacterBounds(imageData, width, height) {
      const data = imageData.data;
      let minX = width;
      let minY = height;
      let maxX = -1;
      let maxY = -1;

      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const i = (y * width + x) * 4;
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];

          if (!isBackgroundPixel(r, g, b)) {
            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x);
            maxY = Math.max(maxY, y);
          }
        }
      }

      if (maxX < minX || maxY < minY) {
        return { x: 0, y: 0, width, height };
      }

      const pad = 8;
      minX = Math.max(0, minX - pad);
      minY = Math.max(0, minY - pad);
      maxX = Math.min(width - 1, maxX + pad);
      maxY = Math.min(height - 1, maxY + pad);

      return {
        x: minX,
        y: minY,
        width: maxX - minX + 1,
        height: maxY - minY + 1
      };
    }

    async function extractSpriteFrames(src, frameCount, frameWidth, frameHeight) {
      const meta = await loadVideo(src);
      const video = document.getElementById("video");
      const sourceCanvas = document.getElementById("canvas");
      const sourceContext = sourceCanvas.getContext("2d", { willReadFrequently: true });
      const frameCanvas = document.createElement("canvas");
      const frameContext = frameCanvas.getContext("2d");
      const frames = [];

      sourceCanvas.width = meta.width;
      sourceCanvas.height = meta.height;
      frameCanvas.width = frameWidth;
      frameCanvas.height = frameHeight;

      for (let i = 0; i < frameCount; i += 1) {
        const time = meta.duration * (i + 0.5) / frameCount;
        await seekVideo(video, time);

        sourceContext.drawImage(video, 0, 0, meta.width, meta.height);
        const imageData = sourceContext.getImageData(0, 0, meta.width, meta.height);
        const bounds = findCharacterBounds(imageData, meta.width, meta.height);

        frameContext.imageSmoothingEnabled = true;
        frameContext.clearRect(0, 0, frameWidth, frameHeight);
        frameContext.fillStyle = "rgb(0,255,0)";
        frameContext.fillRect(0, 0, frameWidth, frameHeight);

        const scale = Math.min(frameWidth / bounds.width, frameHeight / bounds.height);
        const drawWidth = Math.max(1, Math.round(bounds.width * scale));
        const drawHeight = Math.max(1, Math.round(bounds.height * scale));
        const drawX = Math.round((frameWidth - drawWidth) / 2);
        const drawY = frameHeight - drawHeight;

        frameContext.drawImage(
          sourceCanvas,
          bounds.x,
          bounds.y,
          bounds.width,
          bounds.height,
          drawX,
          drawY,
          drawWidth,
          drawHeight
        );

        frames.push({
          time,
          bounds,
          dataUrl: frameCanvas.toDataURL("image/png")
        });
      }

      return {
        meta,
        frameCount,
        frameWidth,
        frameHeight,
        frames
      };
    }
  </script>
</body>
</html>
